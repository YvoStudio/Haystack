<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haystack</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="api.js"></script>
<script src="updater.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #fff; color: #333; line-height: 1.6;
    display: flex;
  }

  /* ---- 左侧导航 ---- */
  .sidebar {
    width: 320px; min-width: 180px;
    height: 100vh; overflow-y: auto;
    border-right: none;
    padding: 0;
    flex-shrink: 0;
  }
  .resize-handle {
    width: 5px; cursor: col-resize; background: transparent;
    flex-shrink: 0; position: relative; z-index: 2;
    border-left: 1px solid #eee;
    transition: background 0.15s;
  }
  .resize-handle:hover, .resize-handle.active { background: #e0e0e0; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  .sidebar .logo-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    height: 40px;
    border-bottom: 1px solid #eee; margin-bottom: 8px;
    position: sticky; top: 0; background: #f8f8f8; z-index: 1;
  }
  .sidebar .logo {
    font-size: 20px; font-weight: 600; color: #111;
  }
  .sidebar .btn-home {
    border: none; background: transparent; color: #6e6e6e; cursor: pointer;
    width: 26px; height: 26px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, color 0.12s;
  }
  .sidebar .btn-home:hover { background: rgba(0,0,0,0.06); color: #1d1d1f; }
  .sidebar .btn-home:active { background: rgba(0,0,0,0.10); }
  .sidebar .btn-home.active { background: #e8e0f0; color: #5b21b6; }
  .sidebar .logo-actions { display: flex; gap: 6px; align-items: center; }

  .tree-item {
    display: flex; align-items: center;
    padding: 7px 20px; cursor: pointer;
    font-size: 15px; color: #555; text-decoration: none;
    user-select: none; white-space: nowrap;
    transition: background 0.1s;
  }
  .tree-item:hover { background: #f8f8f8; color: #111; }
  .tree-item.active { background: #e8e0f0; color: #5b21b6; font-weight: 500; }
  .tree-root-item { border-bottom: 1px solid #eee; padding-top: 4px; padding-bottom: 4px; }
  .tree-root-item .tree-label { font-size: 14px; color: #333; }

  .tree-toggle {
    width: 18px; height: 18px; display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 12px; color: #bbb; flex-shrink: 0; margin-right: 6px;
    transition: transform 0.15s;
  }
  .tree-toggle.open { transform: rotate(90deg); }
  .tree-toggle.empty { visibility: hidden; }

  .tree-icon { margin-right: 8px; width: 18px; height: 18px; flex-shrink: 0; display: inline-flex; align-items: center; }
  .tree-icon svg { width: 18px; height: 18px; }
  .tree-label { overflow: hidden; text-overflow: ellipsis; }
  .tree-children { display: none; }
  .tree-children.open { display: block; }

  /* ---- 右侧内容 ---- */
  .main {
    flex: 1; height: 100vh; overflow-y: auto;
    padding: 0 32px;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

  .topbar {
    margin: 0 -32px 0; padding: 0 32px; font-size: 15px; color: #999;
    position: sticky; top: 0; background: #f8f8f8; z-index: 10;
    border-bottom: 1px solid #eee;
    height: 40px; display: flex; align-items: center;
  }
  .breadcrumb { display: flex; align-items: center; flex: 1; min-width: 0; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; white-space: nowrap; scrollbar-width: thin; }
  .breadcrumb::-webkit-scrollbar { height: 4px; }
  .breadcrumb::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  .breadcrumb a { color: #555; text-decoration: none; flex-shrink: 0; white-space: nowrap; }
  .breadcrumb a:hover { color: #111; }
  .breadcrumb span { margin: 0 4px; color: #ccc; flex-shrink: 0; white-space: nowrap; }

  .btn-star {
    border: none; background: none; cursor: pointer; font-size: 18px;
    margin-left: 10px; padding: 0; color: #ccc; transition: color 0.15s;
    flex-shrink: 0; display: inline-flex; align-items: center; vertical-align: middle;
  }
  .btn-star svg { vertical-align: middle; }
  .btn-star:hover { color: #f59e0b; }
  .btn-star.active { color: #f59e0b; }

  .search-wrap {
    margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    position: relative;
  }
  .search-input {
    width: 160px; padding: 4px 10px 4px 26px; border: none; border-radius: 6px;
    background: #eee; font-size: 12px; color: #333; outline: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10.5' cy='10.5' r='6.5' stroke='%23999' stroke-width='2'/%3E%3Cpath d='M15.5 15.5L20 20' stroke='%23999' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: 8px center;
    transition: width 0.2s, background 0.15s;
  }
  .search-input:focus { width: 220px; background: #fff; box-shadow: 0 0 0 1.5px #bbb; }
  .search-input::placeholder { color: #aaa; }

  .search-results {
    position: absolute; top: 32px; right: 0; width: 500px; max-height: 70vh;
    background: #fff; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    overflow-y: auto; z-index: 100; border: 1px solid #eee;
  }
  .search-results:empty { display: none; }
  .sr-item {
    display: flex; align-items: center; padding: 8px 16px; cursor: pointer;
    font-size: 13px; color: #333; transition: background 0.1s; gap: 10px;
  }
  .sr-item:hover { background: #f8f8f8; }
  .sr-icon { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; }
  .sr-icon svg { width: 20px; height: 20px; }
  .sr-info { flex: 1; min-width: 0; }
  .sr-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sr-path { font-size: 11px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
  .sr-empty { padding: 24px; text-align: center; color: #ccc; font-size: 13px; }
  .sr-loading { padding: 24px; text-align: center; color: #bbb; font-size: 13px; }

  .view-mode {
    flex-shrink: 0;
    padding: 4px 10px; border: none; border-radius: 6px;
    background: #eee; color: #555; font-size: 12px; cursor: pointer;
    outline: none;
  }
  .view-mode:hover { background: #e4e4e4; }

  .btn-bookmarks {
    border: none; background: #eee; color: #555; cursor: pointer;
    padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500;
    flex-shrink: 0; transition: background 0.15s;
  }
  .btn-bookmarks:hover { background: #e4e4e4; }

  /* 缩略图网格 */
  .thumb-grid { display: flex; flex-wrap: wrap; gap: 16px; padding: 16px 0; }
  .thumb-card {
    display: flex; flex-direction: column; align-items: center;
    border-radius: 8px; overflow: visible; cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s;
    background: #fafafa; border: 1px solid #f0f0f0;
    position: relative;
  }
  .thumb-card:hover,
  .thumb-card.sticky {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transform: translateY(-1px); z-index: 10;
    background: #eeeeee;
  }

  /* 大缩略图 hover 时气泡显示的操作菜单 */
  .thumb-actions-popup {
    display: none; position: absolute; top: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); background: #eeeeee; border: 1px solid #dcdcdc;
    border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    padding: 8px; z-index: 150;
  }
  /* 桥接 card 和 popup 之间的 6px 透明区域，避免鼠标穿过时 popup 消失 */
  .thumb-actions-popup::before {
    content: ''; position: absolute; left: -10px; right: -10px;
    top: -10px; height: 10px;
  }
  /* 底部行翻转到卡片上方显示 */
  .thumb-actions-popup.flip-up {
    top: auto; bottom: calc(100% + 6px);
  }
  .thumb-actions-popup.flip-up::before {
    top: auto; bottom: -10px;
  }
  .thumb-card:hover .thumb-actions-popup,
  .thumb-card.sticky .thumb-actions-popup,
  .thumb-actions-popup:hover { display: block; }
  .thumb-actions-popup .file-actions {
    display: flex !important; margin-left: 0; gap: 6px;
    flex-wrap: wrap; max-width: 240px; justify-content: center;
  }
  .thumb-actions-popup.vertical .file-actions {
    flex-direction: column; max-width: none; align-items: stretch;
  }
  .thumb-actions-popup.vertical .file-actions .act-btn {
    justify-content: flex-start;
  }
  .thumb-img-wrap {
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #f5f5f5;
  }
  .thumb-img-wrap img { object-fit: cover; width: 100%; height: 100%; }
  .thumb-img-wrap .thumb-icon { display: flex; align-items: center; justify-content: center; }
  .thumb-img-wrap .thumb-icon svg { opacity: 0.6; }
  .thumb-label {
    padding: 6px 8px; font-size: 12px; color: #555; text-align: center;
    width: 100%; word-break: break-all; line-height: 1.4;
  }
  .thumb-card-sm { width: 100px; }
  .thumb-card-sm .thumb-img-wrap { width: 100px; height: 80px; }
  .thumb-card-sm .thumb-icon svg { width: 32px; height: 32px; }
  .thumb-card-lg { width: 180px; }
  .thumb-card-lg .thumb-img-wrap { width: 180px; height: 140px; }
  .thumb-card-lg .thumb-icon svg { width: 48px; height: 48px; }
  .thumb-card-lg .thumb-label { font-size: 13px; padding: 8px 10px; }

  /* 书签抽屉 */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 1002;
    display: none;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: -50%; width: 50%; height: 100vh;
    background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,0.1);
    z-index: 1003; transition: right 0.25s ease;
    display: flex; flex-direction: column;
  }
  .drawer.open { right: 0; }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid #eee; flex-shrink: 0;
  }
  .drawer-header h3 { font-size: 16px; font-weight: 600; color: #333; }
  .drawer-close {
    border: none; background: none; font-size: 22px; cursor: pointer; color: #999; padding: 0 4px;
  }
  .drawer-body { flex: 1; overflow-y: auto; padding: 12px 0; }
  .bm-item {
    display: flex; align-items: center; padding: 10px 24px; cursor: pointer;
    transition: background 0.1s; font-size: 14px; color: #333;
  }
  .bm-item:hover { background: #f8f8f8; }
  .bm-icon { margin-right: 10px; color: #f59e0b; font-size: 14px; }
  .bm-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bm-del {
    border: none; background: none; color: #ccc; cursor: pointer; font-size: 16px;
    padding: 0 4px; margin-left: 8px; transition: color 0.15s;
  }
  .bm-del:hover { color: #e55; }
  .bm-empty { padding: 40px 24px; text-align: center; color: #ccc; font-size: 14px; }

  .file-list { border-top: 1px solid #eee; }
  .file-item {
    display: flex; align-items: center; padding: 11px 0;
    border-bottom: 1px solid #f7f7f7; text-decoration: none; color: inherit;
    transition: background 0.1s;
  }
  .file-item:hover { background: #fafafa; margin: 0 -12px; padding: 11px 12px; }
  .file-item.highlight { background: #f3f0ff; margin: 0 -12px; padding: 11px 12px; }
  .file-item.highlight .file-actions { display: flex; }
  .file-icon { width: 24px; height: 24px; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .file-icon svg { width: 24px; height: 24px; }
  .file-name-wrap { flex: 1; display: flex; align-items: center; overflow: hidden; min-width: 0; }
  .file-name { font-size: 15px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 600px; }
  .file-name.clickable { cursor: pointer; }
  .file-name.clickable:hover { color: #0066cc; text-decoration: underline; }
  .file-name.no-click { color: #999; cursor: default; }
  .file-item:hover .file-name.clickable { color: #0066cc; }
  .file-actions { display: none; flex-shrink: 0; margin-left: 60px; gap: 20px; align-items: center; }
  .file-item:hover .file-actions { display: flex; }
  .file-actions .act-btn {
    padding: 4px 10px; border: none; border-radius: 6px;
    background: #eee; color: #555; font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s; line-height: 1.4; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .file-actions .act-btn:hover { background: #e4e4e4; color: #333; }
  .file-actions .act-btn.copied { background: #ecfdf5; color: #059669; }
  .file-meta { font-size: 13px; color: #999; margin-left: 31px; flex-shrink: 0; }
  .file-size { width: 80px; text-align: right; }
  .file-date { width: 140px; text-align: right; }
  .file-icon-thumb { width: 48px; height: 48px; margin-right: 14px; border-radius: 4px; overflow: hidden; background: #f5f5f5; }
  .file-icon-thumb svg { width: 28px; height: 28px; }

  .empty-msg { padding: 60px 0; text-align: center; color: #ccc; font-size: 15px; }

  .stats-bar {
    display: flex; align-items: center; padding: 6px 0; font-size: 12px; color: #aaa; gap: 16px;
  }
  .stats-bar .stats-info { flex: 1; }

  /* 创建文件按钮 */
  .btn-create {
    border: none; background: none; cursor: pointer; color: #999;
    margin-left: 6px; padding: 2px; display: inline-flex; align-items: center;
    flex-shrink: 0; transition: color 0.15s;
  }
  .btn-create:hover { color: #333; }
  .create-menu {
    position: absolute; top: 100%; left: 0; width: 180px;
    background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    border: 1px solid #eee; z-index: 100; padding: 6px 0; display: none;
  }
  .create-menu.open { display: block; }
  .create-menu-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 14px;
    font-size: 13px; color: #333; cursor: pointer; transition: background 0.1s;
  }
  .create-menu-item:hover { background: #f5f5f5; }
  .create-menu-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* 更多按钮 */
  .btn-more {
    border: none; background: #eee; color: #888; cursor: pointer;
    width: 24px; height: 24px; border-radius: 6px; font-size: 14px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0; letter-spacing: 1px; line-height: 1;
  }
  .btn-more:hover { background: #e0e0e0; color: #555; }
  .more-menu {
    position: fixed; width: 190px;
    background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    border: 1px solid #eee; z-index: 200; padding: 6px 0; display: none;
  }
  .more-menu.open { display: block; }
  .more-menu-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 14px;
    font-size: 13px; color: #333; cursor: pointer; transition: background 0.1s;
  }
  .more-menu-item:hover { background: #f5f5f5; }
  .more-menu-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* VCS 更新二级菜单 */
  .vcs-parent { position: relative; }
  .vcs-arrow { margin-left: auto; font-size: 11px; color: #999; }
  .vcs-submenu {
    position: absolute; top: -7px; width: 200px;
    background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    border: 1px solid #eee; z-index: 210; padding: 6px 0; display: none;
  }
  .vcs-submenu.to-left { right: 100%; }
  .vcs-submenu.to-right { left: 100%; }
  .vcs-parent:hover > .vcs-submenu { display: block; }

  /* 颜色标签 */
  .color-tag-row {
    display: flex; flex-wrap: wrap;
    gap: 6px; padding: 7px 14px;
  }
  .color-dot-btn {
    width: 16px; height: 16px; min-width: 16px; min-height: 16px; border-radius: 50%; border: 1.5px solid transparent;
    cursor: pointer; transition: transform 0.1s, border-color 0.1s; box-sizing: content-box;
  }
  .color-dot-btn:hover { transform: scale(1.2); }
  .color-dot-btn.active { border-color: #333 !important; }
  .color-dot-btn.clear.active { border-color: transparent !important; background: #ddd; }
  .color-dot-btn.clear {
    background: #eee; position: relative; border-color: transparent !important;
  }
  .color-dot-btn.clear::after {
    content: '×'; position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center; font-size: 12px; color: #999;
  }

  .file-color-dot {
    width: 10px; height: 10px; min-width: 10px; min-height: 10px; border-radius: 50%;
    display: inline-block; margin-left: 6px; flex-shrink: 0; vertical-align: middle;
  }
  .tree-color-dot {
    width: 10px; height: 10px; min-width: 10px; border-radius: 50%; display: inline-block;
    margin-left: 5px; flex-shrink: 0; vertical-align: middle;
  }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 6px;
    font-size: 14px; z-index: 1001; transition: opacity 0.3s;
  }

  @media (max-width: 700px) {
    .sidebar { width: 200px; min-width: 200px; }
    .main { padding: 20px 16px; }
    .file-date { display: none; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo-bar">
    <span class="logo">Haystack</span>
    <div class="logo-actions">
    <button class="btn-home" id="btnToggleHidden" title="显示隐藏文件(夹)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg></button>
    <button class="btn-home" id="btnHome" title="收起全部，回到根目录"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 12l9-8 9 8M5 11v8a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="btn-home" id="btnSettings" title="设置"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>
  <div id="tree"></div>
</div>
<div class="resize-handle" id="resizeHandle"></div>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="search-wrap">
      <span style="position:relative;display:inline-flex;align-items:center;">
        <input class="search-input" id="searchInput" type="text" placeholder="搜索文件...">
        <button id="searchClear" style="position:absolute;right:6px;border:none;background:none;cursor:pointer;color:#aaa;font-size:14px;display:none;padding:0 2px;">&times;</button>
      </span>
      <div class="search-results" id="searchResults"></div>
      <button class="btn-bookmarks" id="btnGotoPath" title="跳转路径 (Cmd/Ctrl+L)">⤳ 跳转</button>

function canOpenInline(name) {
  const ext = name.split('.').pop().toLowerCase();
  return INLINE_EXTS.has(ext);
}

function blocked(name, rel) {
  if (BLACKLIST.names.includes(name)) return true;
  if (BLACKLIST.whitelist && BLACKLIST.whitelist.includes(name)) return false;
  for (const p of BLACKLIST.prefixes) if (name.startsWith(p)) return true;
  const lc = name.toLowerCase();
  for (const e of BLACKLIST.extensions) if (lc.endsWith(e.toLowerCase())) return true;
  const full = rel ? rel + name : name;
  for (const bp of BLACKLIST.paths) if (full === bp || full.startsWith(bp + '/')) return true;
  return false;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' K';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' M';
  return (b / 1073741824).toFixed(1) + ' G';
}
function fmtDate(s) {
  const d = new Date(s); if (isNaN(d)) return s;
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const codeExts = new Set(['js','mjs','cjs','jsonl','ts','tsx','jsx','py','py3','sh','bash','zsh','java','kt','scala','groovy','rb','pl','pm','lua','go','rs','swift','c','h','cpp','hpp','cc','cxx','cs','m','mm','r','jl','hs','erl','ex','exs','clj','php','asp','jsp','bat','ps1','vb','vbs','asm','s','css','html','htm','sql','graphql','proto','tf','yaml','yml','toml','ini','conf','cfg','xml','csv','gradle','sbt','cmake','makefile','dockerfile']);
  const imageExts = new Set(['png','jpg','jpeg','gif','svg','webp','bmp','ico']);
  const videoExts = new Set(['mp4','mov','avi','webm','mkv']);
  const audioExts = new Set(['mp3','wav','flac','ogg','aac']);
  const archiveExts = new Set(['zip','rar','gz','tar','7z','bz2']);

  if (ext === 'md' || ext === 'markdown') return SVG.markdown;
  if (ext === 'json') return SVG.json;
  if (ext === 'pdf') return SVG.pdf;
  if (ext === 'doc' || ext === 'docx' || ext === 'txt' || ext === 'log') return SVG.doc;
  if (ext === 'xls' || ext === 'xlsx') return SVG.spreadsheet;
  if (imageExts.has(ext)) return SVG.image;
  if (videoExts.has(ext)) return SVG.video;
  if (audioExts.has(ext)) return SVG.audio;
  if (archiveExts.has(ext)) return SVG.archive;
  if (codeExts.has(ext)) return SVG.code;
  return SVG.file;
}

// ---- 剪贴板（兼容 HTTP）----
async function copyText(text) {
  // 优先走 Tauri 剪贴板插件,稳定可靠
  if (window.__haystack && window.__haystack.invoke) {
    try {
      await window.__haystack.invoke('plugin:clipboard-manager|write_text', { label: null, text });
      return;
    } catch (e) { /* 回退到下面 */ }
  }
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return; } catch {}
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch {}
  ta.remove();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

  { name: 'gray', color: '#8E8E93' },
];

function getColorTags() {
  let tags;
  try { tags = JSON.parse(localStorage.getItem(TAG_KEY)) || {}; } catch { return {}; }
  // 多根目录重构前的 key 不带 root 前缀("Downloads/"),统一迁移成 navPath("0/Downloads/")
  let dirty = false;
  for (const k of Object.keys(tags)) {
    if (!/^\d+\//.test(k)) {
      const nk = makeNavPath(0, k);
      if (!(nk in tags)) tags[nk] = tags[k];
      delete tags[k];
      dirty = true;
    }
  }
  if (dirty) localStorage.setItem(TAG_KEY, JSON.stringify(tags));
  return tags;
}
const SHOW_HIDDEN_KEY = 'haystack_show_hidden';
function getShowHidden() { return localStorage.getItem(SHOW_HIDDEN_KEY) === '1'; }
function setShowHidden(v) { localStorage.setItem(SHOW_HIDDEN_KEY, v ? '1' : '0'); }

function setColorTag(filePath, color) {
  const tags = getColorTags();
  if (color) tags[filePath] = color; else delete tags[filePath];
  localStorage.setItem(TAG_KEY, JSON.stringify(tags));
  Object.keys(dirCache).forEach(k => delete dirCache[k]);
}
function getColorTag(filePath) {
  return getColorTags()[filePath] || null;
}

function createColorDot(filePath) {
  const color = getColorTag(filePath);
  if (!color) return null;
  const dot = document.createElement('span');
  dot.className = 'file-color-dot';
  dot.style.background = color;
  return dot;
}

function refreshTreeDots() {
  document.querySelectorAll('.tree-item').forEach(el => {
    const p = el.dataset.path;
    const label = el.querySelector('.tree-label');
    if (!label) return;
    const existing = label.querySelector('.tree-color-dot');
    if (existing) existing.remove();
    const color = getColorTag(p);
    if (color) {
      const dot = document.createElement('span');
      dot.className = 'tree-color-dot';
      dot.style.background = color;
      label.appendChild(dot);
    }
  });
  resortTreeSiblings(document.getElementById('tree'));
  document.querySelectorAll('.tree-children').forEach(resortTreeSiblings);
}

function resortTreeSiblings(container) {
  if (!container) return;
  const nodes = Array.from(container.children);
  const keyed = nodes.map((n, idx) => {
    const row = n.querySelector(':scope > .tree-item');
    const tag = row ? getColorTag(row.dataset.path) : null;
    return { n, idx, tag };
  });
  keyed.sort((a, b) => {
    if (a.tag && !b.tag) return -1;
    if (!a.tag && b.tag) return 1;
    return a.idx - b.idx;
  });
  keyed.forEach(({ n }) => container.appendChild(n));
}

// ---- 获取目录数据（带缓存）----
const dirCache = {};
function dirCacheKey(navPath) {
  return navPath + '|' + currentSort + '|' + (getShowHidden() ? 'h' : '');
}
async function fetchDir(navPath) {
  const { rootIdx, rel } = parseNavPath(navPath);
  const cacheKey = dirCacheKey(navPath);
  const showHidden = getShowHidden();
  if (dirCache[cacheKey]) return dirCache[cacheKey];
  const r = await fetch(`/www/_list_all?dir=${encodeURIComponent(rel)}&root=${rootIdx}`);
  if (!r.ok) throw new Error(r.status);
  const items = await r.json();
  const filtered = items.filter(i => {
    if (blocked(i.name, rel)) return false;
    if (i.name.startsWith('.')) {
      if (BLACKLIST.whitelist && BLACKLIST.whitelist.includes(i.name)) return true;
      if (showHidden) return true;
      const key = makeNavPath(rootIdx, rel + i.name + (i.type === 'directory' ? '/' : ''));
      return !!getColorTag(key);
    }
    return true;
  });
  const tagOf = (i) => getColorTag(makeNavPath(rootIdx, rel + i.name + (i.type === 'directory' ? '/' : '')));
  filtered.sort((a, b) => {
    if (a.type === 'directory' && b.type !== 'directory') return -1;
    if (a.type !== 'directory' && b.type === 'directory') return 1;
    const aTag = tagOf(a), bTag = tagOf(b);
    if (aTag && !bTag) return -1;
    if (!aTag && bTag) return 1;
    if (currentSort === 'size') return (b.size || 0) - (a.size || 0);
    if (currentSort === 'date') return new Date(b.mtime) - new Date(a.mtime);
    return a.name.localeCompare(b.name, 'zh-CN');
  });
  dirCache[cacheKey] = filtered;
  return filtered;
}

// ---- 左侧树 ----
let _suppressExpandTree = false;
async function buildTreeLevel(container, navPath, depth) {
  // 防重复加载
  if (container.dataset.loaded) return;
  container.dataset.loaded = '1';

  let items;
  try { items = await fetchDir(navPath); } catch { return; }
  const dirs = items.filter(i => i.type === 'directory');
  const { rootIdx, rel } = parseNavPath(navPath);

  for (const d of dirs) {
    const path = makeNavPath(rootIdx, (rel || '') + d.name + '/');
    const node = document.createElement('div');

    const row = document.createElement('div');
    row.className = 'tree-item';
    row.style.paddingLeft = (20 + depth * 24) + 'px';
    row.dataset.path = path;

    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle';
    toggle.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10"><path d="M3 1.5l4 3.5-4 3.5" stroke="#999" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    const icon = document.createElement('span');
    icon.className = 'tree-icon';
    icon.innerHTML = SVG.folder;

    const label = document.createElement('span');
    label.className = 'tree-label';
    label.textContent = d.name;
    const treeDotColor = getColorTag(path);
    if (treeDotColor) {
      const treeDot = document.createElement('span');
      treeDot.className = 'tree-color-dot';
      treeDot.style.background = treeDotColor;
      label.appendChild(treeDot);
    }

    row.append(toggle, icon, label);

    const children = document.createElement('div');
    children.className = 'tree-children';

    row.addEventListener('click', async (e) => {
      e.stopPropagation();

      if (!children.dataset.loaded) {
        await buildTreeLevel(children, path, depth + 1);
        if (children.children.length === 0) toggle.classList.add('empty');
      }
      const willOpen = !children.classList.contains('open');
      children.classList.toggle('open', willOpen);
      toggle.classList.toggle('open', willOpen);

      // 告诉 hashchange 不要再跑 expandTreeTo 覆盖我们刚才的折叠/展开
      _suppressExpandTree = true;
      navigate(path);
    });

    node.append(row, children);
    container.appendChild(node);
  }
}

  overlay.appendChild(box);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  setTimeout(() => input.focus(), 50);

// 命令执行结果弹框:多行输出用等宽 pre 展示,可滚动
function showResultDialog(title, text, isError) {

  const titleEl = document.createElement('div');

  titleEl.textContent = title;

  const pre = document.createElement('pre');

  return function update(newTitle, newText, newIsError) {

async function createFile(navPath, template) {
  const { rootIdx, rel } = parseNavPath(navPath);
  const rootParam = `?root=${rootIdx}`;
  if (template.isDir) {
    showNameDialog('新建文件夹', '', async (name) => {
      try {
        const r = await fetch('/www/_create' + rootParam, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir: (rel || '') + name, name: '.gitkeep', content: '' }),
        });
        const d = await r.json();
        if (d.error) { showToast('创建失败: ' + d.error); return; }
        Object.keys(dirCache).forEach(k => { if (k.startsWith(navPath + '|')) delete dirCache[k]; });
        await renderFiles(navPath);
        showToast('文件夹已创建');
      } catch { showToast('创建失败'); }
    });
    return;
  }
  if (template.base64) {
    showNameDialog('新建 ' + template.label, '未命名.' + template.ext, async (name) => {
      try {
        const r = await fetch('/www/_create' + rootParam, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir: rel || '', name, base64: true, content: FILE_TEMPLATE_B64[template.ext] }),
        });
        const d = await r.json();
        if (d.error) { showToast('创建失败: ' + d.error); return; }
        Object.keys(dirCache).forEach(k => { if (k.startsWith(navPath + '|')) delete dirCache[k]; });
        await renderFiles(navPath);
        showToast('文件已创建');
      } catch { showToast('创建失败'); }
    });
  } else {
    // 文本文件：打开编辑器弹窗
    showCreateEditor(navPath, template);
  }
}

let currentViewMode = localStorage.getItem('hxjs_viewMode') || 'list';
let currentSort = localStorage.getItem('hxjs_sort') || 'name';

async function renderFiles(navPath) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="empty-msg">加载中...</div>';
  renderBreadcrumb(navPath);
  highlightTree(navPath);
  const { rel } = parseNavPath(navPath);
  document.title = rel ? `Haystack / ${navPath}` : 'Haystack';
  if (typeof buildViewSortMenu === 'function') buildViewSortMenu();

  let items;
  try { items = await fetchDir(navPath); } catch (e) {
    el.innerHTML = `<div class="empty-msg">加载失败 (${e.message})</div>`; return;
  }
  if (items.length === 0) { el.innerHTML = '<div class="empty-msg">空目录</div>'; return; }

  el.innerHTML = '';

  // 更新面包屑里的统计
  const dirCount = items.filter(i => i.type === 'directory').length;
  const fileCount = items.length - dirCount;
  const statsEl = document.getElementById('bcStats');
  if (statsEl) {
    const p = [];
    if (dirCount > 0) p.push(dirCount + ' 个文件夹');
    if (fileCount > 0) p.push(fileCount + ' 个文件');
    statsEl.textContent = p.join(' · ');
  }

  if (currentViewMode === 'list' || currentViewMode === 'thumb-sm') {
    renderListView(el, items, navPath);
  } else {
    renderThumbView(el, items, navPath, true);
  }
}

async function renderListView(el, items, navPath) {
  const { rootIdx, rel } = parseNavPath(navPath);
  const listEl = document.createElement('div');
  listEl.className = 'file-list';

  if (rel) {
    const parent = rel.split('/').filter(Boolean).slice(0, -1).join('/');
    const ph = parent ? parent + '/' : '';
    const up = document.createElement('a');
    up.className = 'file-item';
    up.href = `#/${makeNavPath(rootIdx, ph)}`;
    up.innerHTML = `<div class="file-icon">${SVG.back}</div><div class="file-name clickable">..</div>
      <div class="file-meta file-size"></div><div class="file-meta file-date"></div>`;
    listEl.appendChild(up);
  }

  for (const item of items) {
    const isDir = item.type === 'directory';
    const itemNavPath = makeNavPath(rootIdx, (rel || '') + item.name);
    const itemNavPathDir = makeNavPath(rootIdx, (rel || '') + item.name + '/');
    const filePath = `${BASE}${itemNavPath}`;
    const fullUrl = location.origin + filePath;
    const localPath = await __haystackAbs(itemNavPath);
    const icon = isDir ? SVG.folder : fileIcon(item.name);
    const size = isDir ? '' : fmtSize(item.size || 0);
    const date = fmtDate(item.mtime);
    const inline = !isDir && canOpenInline(item.name);

    const row = document.createElement('div');
    row.className = 'file-item';
    const isThumbSm = currentViewMode === 'thumb-sm';
    const ext2 = item.name.split('.').pop().toLowerCase();
    const isImage2 = !isDir && IMAGE_EXTS.has(ext2);

    const iconEl = document.createElement('div');
    if (isThumbSm) {
      iconEl.className = 'file-icon file-icon-thumb';
      if (isImage2) {
        iconEl.innerHTML = `<img src="${filePath}" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:4px;">`;
      } else {
        iconEl.className = 'file-icon file-icon-thumb';
        iconEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${icon}</div>`;
      }
      row.style.padding = '8px 0';
    } else {
      iconEl.className = 'file-icon';
      iconEl.innerHTML = icon;
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'file-name';
    nameEl.textContent = item.name;
    nameEl.title = item.name;

    // 颜色标签(key 统一用带 root 前缀的 navPath)
    const colorDot = createColorDot(isDir ? itemNavPathDir : itemNavPath);
    if (colorDot) nameEl.appendChild(colorDot);

    const fileExt = item.name.split('.').pop().toLowerCase();
    const isBinary = BINARY_EXTS.has(fileExt) || OFFICE_EXTS.has(fileExt);

    if (isDir) {
      nameEl.classList.add('clickable');
      row.style.cursor = 'pointer';
      row.addEventListener('click', () => { location.hash = `#/${itemNavPathDir}`; });
    } else {
      nameEl.classList.add('clickable');
      row.style.cursor = 'pointer';
      row.addEventListener('click', () => { previewFile(filePath, item.name); });
    }

    const nameWrap = document.createElement('div');
    nameWrap.className = 'file-name-wrap';
    nameWrap.appendChild(nameEl);

    if (isDir) {
      nameWrap.appendChild(buildDirActions(localPath, itemNavPathDir));
    } else {
      nameWrap.appendChild(buildActions(filePath, fullUrl, localPath, item.name));
    }

    row.append(iconEl, nameWrap);

    const sizeEl = document.createElement('div');
    sizeEl.className = 'file-meta file-size';
    sizeEl.textContent = size;
    const dateEl = document.createElement('div');
    dateEl.className = 'file-meta file-date';
    dateEl.textContent = date;

    row.append(sizeEl, dateEl);
    listEl.appendChild(row);
  }

  el.appendChild(listEl);
}

async function renderThumbView(el, items, navPath, isLarge) {
  const { rootIdx, rel } = parseNavPath(navPath);
  // 上级目录
  if (rel) {
    const parent = rel.split('/').filter(Boolean).slice(0, -1).join('/');
    const ph = parent ? parent + '/' : '';
    const backLink = document.createElement('a');
    backLink.href = `#/${makeNavPath(rootIdx, ph)}`;
    backLink.style.cssText = 'display:flex;align-items:center;gap:6px;padding:10px 0;color:#555;text-decoration:none;font-size:14px;width:100%;white-space:nowrap;';
    backLink.innerHTML = `<span style="flex-shrink:0;display:flex;align-items:center;">${SVG.back}</span> 返回上级`;
    el.appendChild(backLink);
  }

  const grid = document.createElement('div');
  grid.className = 'thumb-grid';
  const cardClass = isLarge ? 'thumb-card thumb-card-lg' : 'thumb-card thumb-card-sm';

  for (const item of items) {
    const isDir = item.type === 'directory';
    const itemNavPath = makeNavPath(rootIdx, (rel || '') + item.name);
    const itemNavPathDir = makeNavPath(rootIdx, (rel || '') + item.name + '/');
    const filePath = `${BASE}${itemNavPath}`;
    const ext = item.name.split('.').pop().toLowerCase();
    const isImage = !isDir && IMAGE_EXTS.has(ext);
    const inline = !isDir && canOpenInline(item.name);

    const card = document.createElement('div');
    card.className = cardClass;
    card.title = item.name;
    card.dataset.name = item.name;
    card.dataset.type = item.type;

    const imgWrap = document.createElement('div');
    imgWrap.className = 'thumb-img-wrap';

    if (isImage) {
      const img = document.createElement('img');
      img.src = filePath;
      img.loading = 'lazy';
      imgWrap.appendChild(img);
      if (item.size) {
        const sizeTag = document.createElement('div');
        sizeTag.style.cssText = 'position:absolute;bottom:4px;right:6px;font-size:10px;color:#fff;background:rgba(0,0,0,0.4);padding:1px 5px;border-radius:4px;';
        sizeTag.textContent = fmtSize(item.size);
        imgWrap.style.position = 'relative';
        imgWrap.appendChild(sizeTag);
      }
    } else {
      const iconWrap = document.createElement('div');
      iconWrap.className = 'thumb-icon';
      iconWrap.innerHTML = isDir ? SVG.folder : fileIcon(item.name);
      imgWrap.appendChild(iconWrap);
      // 非图片文件：右下角显示大小
      if (!isDir && item.size) {
        const sizeTag = document.createElement('div');
        sizeTag.style.cssText = 'position:absolute;bottom:4px;right:6px;font-size:10px;color:#aaa;';
        sizeTag.textContent = fmtSize(item.size);
        imgWrap.style.position = 'relative';
        imgWrap.appendChild(sizeTag);
      }
    }

    const label = document.createElement('div');
    label.className = 'thumb-label';
    label.textContent = item.name;

    card.append(imgWrap, label);

    if (isLarge) {
      const localPath = await __haystackAbs(itemNavPath);
      const fullUrl = location.origin + filePath;
      const popup = document.createElement('div');
      popup.className = 'thumb-actions-popup';
      if (isDir) {
        popup.appendChild(buildDirActions(localPath, itemNavPathDir));
      } else {
        popup.appendChild(buildActions(filePath, fullUrl, localPath, item.name));
      }
      // capture phase：btnMore 会 stopPropagation，所以必须在它之前拦到
      popup.addEventListener('click', (e) => {
        if (e.target.closest('.btn-more')) {
          card.classList.add('sticky');
          setTimeout(() => {
            if (activeMoreMenu) {
              activeMoreMenu.addEventListener('mouseenter', cancelThumbClose);
              activeMoreMenu.addEventListener('mouseleave', scheduleThumbClose);
            }
          }, 0);
        }
      }, true);
      // bubble phase：阻止点击 popup 背景时冒泡到 card 触发 navigate/preview
      popup.addEventListener('click', (e) => e.stopPropagation());
      card.appendChild(popup);
      // 内容过宽时改为纵向显示
      requestAnimationFrame(() => {
        const actions = popup.querySelector('.file-actions');
        if (actions && actions.scrollWidth > 240) {
          popup.classList.add('vertical');
        }
      });
      // hover 追踪：进出 card/popup 都取消/启动关闭定时器
      card.addEventListener('mouseenter', () => {
        // 进入新卡片时，如果别的卡片还留着 sticky 的 more-menu，先关掉
        const otherSticky = document.querySelector('.thumb-card.sticky');
        if (otherSticky && otherSticky !== card) {
          closeMoreMenu();
        }
        cancelThumbClose();
        const r = card.getBoundingClientRect();
        const spaceBelow = window.innerHeight - r.bottom;
        const spaceAbove = r.top;
        if (spaceBelow < 180 && spaceAbove > spaceBelow) {
          popup.classList.add('flip-up');
        } else {
          popup.classList.remove('flip-up');
        }
      });
      card.addEventListener('mouseleave', scheduleThumbClose);
      popup.addEventListener('mouseenter', cancelThumbClose);
      popup.addEventListener('mouseleave', scheduleThumbClose);
    }

    if (isDir) {
      card.addEventListener('click', () => { location.hash = `#/${itemNavPathDir}`; });
    } else {
      card.addEventListener('click', () => { previewFile(filePath, item.name); });
    }

    grid.appendChild(card);
  }

  el.appendChild(grid);
}

function createStarBtn(itemPath, type) {
  const btn = document.createElement('button');
  btn.className = 'act-btn';
  const starOn = '<svg width="12" height="12" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3 6.6.8-4.9 4.5 1.3 6.9L12 17.3 6.1 20.5l1.3-6.9L2.5 9.1l6.6-.8z" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" stroke-linejoin="round"/></svg>';
  const starOff = '<svg width="12" height="12" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3 6.6.8-4.9 4.5 1.3 6.9L12 17.3 6.1 20.5l1.3-6.9L2.5 9.1l6.6-.8z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>';
  function update() {
    const on = isBookmarked(itemPath);
    btn.innerHTML = (on ? starOn : starOff) + (on ? '已收藏' : '收藏');
    if (on) btn.classList.add('copied'); else btn.classList.remove('copied');
  }
  update();
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleBookmark(itemPath, type);
    update();
  });
  return btn;
}

function buildDirActions(localPath, relPath) {
  const actions = document.createElement('div');
  actions.className = 'file-actions';

  const btnStar = createStarBtn(relPath, 'directory');

  const btnMore = document.createElement('button');
  btnMore.className = 'btn-more';
  btnMore.textContent = '···';
  btnMore.addEventListener('click', (e) => {
    e.stopPropagation();
    showMoreMenu(btnMore, localPath, relPath, true);
  });

  actions.append(btnStar, btnMore);
  return actions;
}

function buildActions(filePath, fullUrl, localPath, name) {
  const actions = document.createElement('div');
  actions.className = 'file-actions';

  const ext = name.split('.').pop().toLowerCase();
  const relFilePath = filePath.replace(BASE, '');
  const isBinOrOffice = BINARY_EXTS.has(ext) || OFFICE_EXTS.has(ext);

  // 新标签打开按钮
  const btnOpen = document.createElement('button');

  });

  // 所有文件都加"打开"按钮(桌面版统一走系统默认应用)
  actions.appendChild(btnOpen);
  actions.appendChild(createStarBtn(relFilePath, 'file'));
  actions.appendChild(btnCopy);

  const btnMore = document.createElement('button');
  btnMore.className = 'btn-more';
  btnMore.textContent = '···';
  btnMore.addEventListener('click', (e) => {
    e.stopPropagation();
    showMoreMenu(btnMore, localPath, relFilePath, false);
  });
  actions.appendChild(btnMore);

  return actions;
}

// ---- 预览 ----
const MD_EXTS = new Set(['md','markdown']);
const VIDEO_EXTS = new Set(['mp4','webm','mov','ogg']);
const AUDIO_EXTS_PLAY = new Set(['mp3','wav','ogg','aac','flac']);
const OFFICE_EXTS = new Set(['docx','xlsx','pptx','doc','xls','ppt']);
const BINARY_EXTS = new Set(['dmg','zip','msi','exe','pkg','jar','rar','7z','gz','tar','bz2','iso','bin','dll','so','dylib','app','deb','rpm','apk','ipa','war','ear','class','pyc','pyo','o','a','lib','whl','egg','ttf','otf','woff','woff2','eot','ttc']);
// 扩展名 → highlight.js 语言名映射
const LANG_MAP = {
  js:'javascript',mjs:'javascript',cjs:'javascript',ts:'typescript',tsx:'tsx',jsx:'jsx',
  py:'python',py3:'python',rb:'ruby',sh:'bash',bash:'bash',zsh:'bash',
  java:'java',kt:'kotlin',scala:'scala',groovy:'groovy',
  go:'go',rs:'rust',swift:'swift',c:'c',h:'c',cpp:'cpp',hpp:'cpp',
  cc:'cpp',cxx:'cpp',cs:'csharp',m:'objectivec',mm:'objectivec',
  lua:'lua',pl:'perl',pm:'perl',php:'php',r:'r',
  sql:'sql',json:'json',jsonl:'json',xml:'xml',yaml:'yaml',yml:'yaml',toml:'ini',
  ini:'ini',conf:'ini',cfg:'ini',css:'css',html:'xml',htm:'xml',
  dockerfile:'dockerfile',makefile:'makefile',cmake:'cmake',
  graphql:'graphql',proto:'protobuf',tf:'hcl',
  gradle:'gradle',sbt:'scala',csv:'plaintext',log:'plaintext',txt:'plaintext',
};

const HTML_EXTS = new Set(['html','htm']);

function previewFile(url, name) {
  const ext = name.split('.').pop().toLowerCase();
  const rel = pathFromHash();
  const cached = dirCache[dirCacheKey(rel)];
  const fileInfo = cached && cached.find(f => f.name === name);
  const size = fileInfo ? fileInfo.size : 0;

  // 浏览器原生流式预览(image/video/audio/pdf):不 fetch 全文,大小再大也不会卡
  if (IMAGE_EXTS.has(ext)) { showImagePreview(url, name); return; }
  if (VIDEO_EXTS.has(ext)) { showVideoPreview(url, name); return; }
  if (AUDIO_EXTS_PLAY.has(ext)) { showAudioPreview(url, name); return; }
  if (ext === 'pdf') { showPdfPreview(url, name); return; }
  // 二进制/办公文档:本来就只显示图标
  if (BINARY_EXTS.has(ext) || OFFICE_EXTS.has(ext)) {
    showLargeFilePreview(url, name, size); return;
  }

  // 以下都要把整文件 fetch 成文本 → > 5MB 直接拒,避免吃满内存和卡死 UI 线程
  if (size > 5 * 1024 * 1024) { showLargeFilePreview(url, name, size); return; }

  if (HTML_EXTS.has(ext)) { showHtmlPreview(url, name); return; }
  if (MD_EXTS.has(ext)) { showMarkdownPreview(url, name); return; }
  showCodePreview(url, name);
}

function formatXml(xml) {
  let formatted = '';
  let indent = 0;
  const lines = xml.replace(/>\s*</g, '>\n<').split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (trimmed.startsWith('</')) indent--;
    formatted += '  '.repeat(Math.max(indent, 0)) + trimmed + '\n';
    if (trimmed.startsWith('<') && !trimmed.startsWith('</') && !trimmed.startsWith('<?') && !trimmed.endsWith('/>') && !trimmed.includes('</')) indent++;
  }
  return formatted.trim();
}

async function showCodePreview(url, name) {
  const box = createModal(name, url);
  const ext = name.split('.').pop().toLowerCase();
  const isJson = ext === 'json' || ext === 'jsonl';
  const isXml = ext === 'xml' || ext === 'svg' || ext === 'xsl' || ext === 'xslt';

  const header = box.querySelector('div');
  let rawText = '';

  // 复制按钮
  const btnCopyCode = document.createElement('button');
  btnCopyCode.style.cssText = 'border:none;background:#eee;color:#333;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s;white-space:nowrap;';
  btnCopyCode.style.cssText += 'display:inline-flex;align-items:center;gap:4px;';
  btnCopyCode.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>复制';
  btnCopyCode.addEventListener('click', () => {
    copyText(rawText).then(() => {
      btnCopyCode.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>已复制';
      btnCopyCode.style.background = '#ecfdf5';
      btnCopyCode.style.color = '#059669';
      setTimeout(() => { btnCopyCode.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>复制'; btnCopyCode.style.background = '#eee'; btnCopyCode.style.color = '#333'; }, 1500);
    });
  });
  header.insertBefore(btnCopyCode, header.lastElementChild);

  // 超过这个字节数就跳过 hljs 高亮:hljs.highlightElement 对几百 KB 的 JSON/XML 是同步阻塞,会把 UI 卡死
  const HIGHLIGHT_MAX = 300 * 1024;

  // JSON 格式化按钮
  let formatted = false;
  if (isJson) {
    const btnFmt = document.createElement('button');
    btnFmt.style.cssText = 'border:none;background:#eee;color:#333;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s;white-space:nowrap;';
    btnFmt.style.cssText += 'display:inline-flex;align-items:center;gap:4px;';
    btnFmt.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h10M4 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>格式化';
    btnFmt.addEventListener('click', () => {
      formatted = !formatted;
      if (formatted) {
        try {
          code.textContent = JSON.stringify(JSON.parse(rawText), null, 2);
        } catch { code.textContent = rawText; }
        btnFmt.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>原始';
      } else {
        code.textContent = rawText;
        btnFmt.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h10M4 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>格式化';
      }
      if (code.textContent.length <= HIGHLIGHT_MAX) {
        code.removeAttribute('data-highlighted');
        code.className = 'language-json';
        hljs.highlightElement(code);
      }
    });
    header.insertBefore(btnFmt, header.lastElementChild);
  }

  // XML 格式化按钮
  if (isXml) {
    let xmlFormatted = false;
    const btnXmlFmt = document.createElement('button');
    btnXmlFmt.style.cssText = 'border:none;background:#eee;color:#333;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;';
    btnXmlFmt.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h10M4 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>格式化';
    btnXmlFmt.addEventListener('click', () => {
      xmlFormatted = !xmlFormatted;
      if (xmlFormatted) {
        code.textContent = formatXml(rawText);
        btnXmlFmt.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>原始';
      } else {
        code.textContent = rawText;
        btnXmlFmt.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h10M4 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>格式化';
      }
      if (code.textContent.length <= HIGHLIGHT_MAX) {
        code.removeAttribute('data-highlighted');
        code.className = 'language-xml';
        hljs.highlightElement(code);
      }
    });
    header.insertBefore(btnXmlFmt, header.lastElementChild);
  }

  const wrap = document.createElement('div');
  wrap.style.cssText = 'flex:1;overflow:auto;margin:0;padding:0;background:#f6f8fa;';
  const pre = document.createElement('pre');
  pre.style.cssText = 'margin:0;padding:20px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-all;';
  const code = document.createElement('code');
  code.style.cssText = 'font-family:Menlo,Monaco,Consolas,monospace;';
  code.textContent = '加载中...';
  pre.appendChild(code);
  wrap.appendChild(pre);
  box.appendChild(wrap);

  const lang = LANG_MAP[ext] || '';

  try {
    const r = await fetch(url);
    rawText = await r.text();
    code.textContent = rawText;
    // 内容超过软阈值 → 跳过 hljs(几百 KB+ 的同步高亮会卡死 UI),提示用户
    if (rawText.length > HIGHLIGHT_MAX) {
      const note = document.createElement('div');
      note.style.cssText = 'padding:6px 14px;font-size:11.5px;color:#92632e;background:#fff7e6;border-bottom:1px solid #ffe7a8;';
      note.textContent = `内容较大(${fmtSize(rawText.length)}),已跳过语法高亮`;
      wrap.insertBefore(note, pre);
    } else {
      if (lang && hljs.getLanguage(lang)) {
        code.className = 'language-' + lang;
      }
      hljs.highlightElement(code);
    }
  } catch (e) {
    code.textContent = '加载失败: ' + e.message;
  }
}

  zoomLabel.style.cssText = 'min-width:42px;text-align:center;cursor:pointer;';
  zoomLabel.title = '点击复位 (Ctrl+0)';
  zoomLabel.textContent = '100%';
  zoomLabel.addEventListener('click', (e) => { e.stopPropagation(); zoomReset(); });
  const btnZoomIn = document.createElement('button');
  btnZoomIn.style.cssText = zoomBtnStyle;
  btnZoomIn.textContent = '+';
  btnZoomIn.title = '放大 (Ctrl++)';
  btnZoomIn.onmouseenter = () => btnZoomIn.style.background = 'rgba(255,255,255,0.15)';
  btnZoomIn.onmouseleave = () => btnZoomIn.style.background = 'transparent';
  btnZoomIn.addEventListener('click', (e) => { e.stopPropagation(); zoomIn(); });
  zoomBar.append(btnZoomOut, zoomLabel, btnZoomIn);

  // 双击 / 滚轮缩放
  img.addEventListener('dblclick', (e) => { e.stopPropagation(); scale === 1 ? (scale = 2, applyScale()) : zoomReset(); });
  body.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      e.deltaY < 0 ? zoomIn() : zoomOut();
    }
  }, { passive: false });

  const infoTag = document.createElement('div');
  infoTag.style.cssText = 'position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,0.4);color:#fff;padding:3px 12px;border-radius:10px;font-size:12px;';

  img.addEventListener('load', () => {
    const w = img.naturalWidth, h = img.naturalHeight;
    // 找文件大小
    const rel = pathFromHash();
    const cached = dirCache[dirCacheKey(rel)];
    const fileInfo = cached && cached.find(f => f.name === currentImages[idx].name);
    const sizeStr = fileInfo ? fmtSize(fileInfo.size || 0) : '';
    infoTag.textContent = `${w} × ${h}` + (sizeStr ? `  ·  ${sizeStr}` : '');
  });

  function show(i) {
    idx = i;
    img.src = currentImages[idx].url;
    titleEl.textContent = currentImages[idx].name;
    counter.textContent = (idx + 1) + ' / ' + currentImages.length;
    btnPrev.style.visibility = idx > 0 ? 'visible' : 'hidden';
    btnNext.style.visibility = idx < currentImages.length - 1 ? 'visible' : 'hidden';
    infoTag.textContent = '';
    zoomReset();
  }

  btnPrev.addEventListener('click', (e) => { e.stopPropagation(); if (idx > 0) show(idx - 1); });
  btnNext.addEventListener('click', (e) => { e.stopPropagation(); if (idx < currentImages.length - 1) show(idx + 1); });

  // 键盘左右切换
  const modal = box.parentElement;
  function onKey(e) {
    if (e.key === 'ArrowLeft' && idx > 0) show(idx - 1);
    if (e.key === 'ArrowRight' && idx < currentImages.length - 1) show(idx + 1);
    if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) { e.preventDefault(); zoomIn(); }
    if ((e.ctrlKey || e.metaKey) && e.key === '-') { e.preventDefault(); zoomOut(); }
    if ((e.ctrlKey || e.metaKey) && e.key === '0') { e.preventDefault(); zoomReset(); }
  }
  document.addEventListener('keydown', onKey);
  // modal 关闭时移除监听
  const observer = new MutationObserver(() => {
    if (!document.getElementById('preview-modal')) {
      document.removeEventListener('keydown', onKey);
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true });

  body.append(btnPrev, img, btnNext, infoTag, zoomBar);
  if (currentImages.length > 1) body.appendChild(counter);
  box.appendChild(body);
  show(idx);
}

// ---- 书签 ----
const BM_KEY = 'hxjs_bookmarks';
function getBookmarks() {
  try {
    const raw = JSON.parse(localStorage.getItem(BM_KEY)) || [];
    // 兼容旧格式：字符串 → 对象;多根重构前的路径不带 root 前缀,统一补成 navPath
    return raw.map(b => {
      const bm = typeof b === 'string' ? { path: b, type: 'directory' } : b;
      if (bm.path && !/^\d+\//.test(bm.path)) bm.path = makeNavPath(0, bm.path);
      return bm;
    });
  } catch { return []; }
}
function saveBookmarks(list) {
  localStorage.setItem(BM_KEY, JSON.stringify(list));
}
function isBookmarked(path) {
  return getBookmarks().some(b => b.path === path);
}
function toggleBookmark(path, type) {
  const list = getBookmarks();
  const idx = list.findIndex(b => b.path === path);
  if (idx >= 0) list.splice(idx, 1); else list.push({ path, type: type || 'directory' });
  saveBookmarks(list);
}

function renderBookmarkItem(body, bm) {
  const item = document.createElement('div');
  item.className = 'bm-item';

  const icon = document.createElement('span');
  icon.className = 'bm-icon';
  icon.innerHTML = bm.type === 'file' ? SVG.file : SVG.folder;
  icon.style.cssText = 'width:16px;height:16px;display:flex;align-items:center;';
  icon.querySelector('svg').style.cssText = 'width:16px;height:16px;';

  const label = document.createElement('span');
  label.className = 'bm-path';
  // 显示时去掉 root 前缀("0/Downloads/" → "Downloads/")
  const bmRel = parseNavPath(bm.path || '').rel;
  label.textContent = bmRel ? '~ / ' + bmRel.replace(/\/$/, '').replace(/\//g, ' / ') : '~';
  label.title = bmRel || '/';

  const del = document.createElement('button');
  del.className = 'bm-del';
  del.innerHTML = '&times;';
  del.title = '删除书签';
  del.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleBookmark(bm.path, bm.type);
    openDrawer();
  });

  item.append(icon, label, del);
  item.addEventListener('click', () => {
    closeDrawer();
    if (bm.type === 'file') {
      window.open(BASE + bm.path, '_blank');
    } else {
      location.hash = '#/' + bm.path;
    }
  });
  body.appendChild(item);
}

let drawerColorFilter = null;

function openDrawer() {
  drawerColorFilter = null;
  buildDrawerColorFilter();
  renderDrawerContent();
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function buildDrawerColorFilter() {
  const container = document.getElementById('drawerColorFilter');
  container.innerHTML = '';
  const tags = getColorTags();
  const usedColors = new Set(Object.values(tags));
  if (usedColors.size === 0) return;

  // "全部"按钮
  const allBtn = document.createElement('div');
  allBtn.style.cssText = 'width:20px;height:20px;min-width:20px;border-radius:50%;border:none;background:' + (!drawerColorFilter ? '#ddd' : '#eee') + ';cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999;';
  allBtn.textContent = '×';
  allBtn.addEventListener('click', () => { drawerColorFilter = null; buildDrawerColorFilter(); renderDrawerContent(); });
  container.appendChild(allBtn);

  for (const tc of TAG_COLORS) {
    if (!usedColors.has(tc.color)) continue;
    const dot = document.createElement('div');
    dot.style.cssText = `width:20px;height:20px;min-width:20px;border-radius:50%;background:${tc.color};cursor:pointer;border:none;box-shadow:${drawerColorFilter === tc.color ? '0 0 0 2px #fff, 0 0 0 4px ' + tc.color : 'none'};transition:transform 0.1s;`;
    dot.addEventListener('mouseenter', () => dot.style.transform = 'scale(1.15)');
    dot.addEventListener('mouseleave', () => dot.style.transform = '');
    dot.addEventListener('click', () => { drawerColorFilter = tc.color; buildDrawerColorFilter(); renderDrawerContent(); });
    container.appendChild(dot);
  }
}

function renderDrawerContent() {
  const body = document.getElementById('drawerBody');
  body.innerHTML = '';

  if (drawerColorFilter) {
    // 显示该颜色标记的条目
    const tags = getColorTags();
    const items = Object.entries(tags).filter(([, c]) => c === drawerColorFilter).map(([p]) => p);
    if (items.length === 0) {
      body.innerHTML = '<div class="bm-empty">无该颜色标记的项目</div>';
      return;
    }
    const dirs = items.filter(p => p.endsWith('/'));
    const files = items.filter(p => !p.endsWith('/'));

    if (dirs.length > 0) {
      const heading = document.createElement('div');
      heading.style.cssText = 'padding:8px 24px 4px;font-size:11px;color:#aaa;font-weight:600;';
      heading.textContent = '文件夹';
      body.appendChild(heading);
      for (const p of dirs) renderBookmarkItem(body, { path: p, type: 'directory' });
    }
    if (files.length > 0) {
      if (dirs.length > 0) { const sep = document.createElement('div'); sep.style.cssText = 'height:1px;background:#eee;margin:8px 0;'; body.appendChild(sep); }
      const heading = document.createElement('div');
      heading.style.cssText = 'padding:8px 24px 4px;font-size:11px;color:#aaa;font-weight:600;';
      heading.textContent = '文件';
      body.appendChild(heading);
      for (const p of files) renderBookmarkItem(body, { path: p, type: 'file' });
    }
  } else {
    // 显示书签列表
    const list = getBookmarks();
    if (list.length === 0) {
      body.innerHTML = '<div class="bm-empty">暂无书签</div>';
      return;
    }
    const dirs = list.filter(b => b.type !== 'file');
    const files = list.filter(b => b.type === 'file');

    if (dirs.length > 0) {
      const heading = document.createElement('div');
      heading.style.cssText = 'padding:8px 24px 4px;font-size:11px;color:#aaa;font-weight:600;';
      heading.textContent = '文件夹';
      body.appendChild(heading);
      for (const bm of dirs) renderBookmarkItem(body, bm);
    }
    if (files.length > 0) {
      if (dirs.length > 0) { const sep = document.createElement('div'); sep.style.cssText = 'height:1px;background:#eee;margin:8px 0;'; body.appendChild(sep); }
      const heading = document.createElement('div');
      heading.style.cssText = 'padding:8px 24px 4px;font-size:11px;color:#aaa;font-weight:600;';
      heading.textContent = '文件';
      body.appendChild(heading);
      for (const bm of files) renderBookmarkItem(body, bm);
    }
  }
}

  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');

// ---- 搜索 ----
let searchTimer = null;
let pendingHighlight = null; // 搜索跳转后要高亮的文件名
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'block' : 'none';
  if (!q) { searchResults.innerHTML = ''; return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchResults.innerHTML = '';
  searchClear.style.display = 'none';
  searchInput.focus();
});

let searchSelectedIdx = -1;

searchInput.addEventListener('keydown', (e) => {
  const items = searchResults.querySelectorAll('.sr-item');
  if (e.key === 'Escape') {
    searchInput.value = '';
    searchResults.innerHTML = '';
    searchInput.blur();
    searchSelectedIdx = -1;
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchSelectedIdx = Math.min(searchSelectedIdx + 1, items.length - 1);
    items.forEach((el, i) => el.style.background = i === searchSelectedIdx ? '#f0f0f0' : '');
    if (items[searchSelectedIdx]) items[searchSelectedIdx].scrollIntoView({ block: 'nearest' });
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchSelectedIdx = Math.max(searchSelectedIdx - 1, 0);
    items.forEach((el, i) => el.style.background = i === searchSelectedIdx ? '#f0f0f0' : '');
    if (items[searchSelectedIdx]) items[searchSelectedIdx].scrollIntoView({ block: 'nearest' });
    return;
  }
  if (e.key === 'Enter' && searchSelectedIdx >= 0 && items[searchSelectedIdx]) {
    e.preventDefault();
    items[searchSelectedIdx].click();
    searchSelectedIdx = -1;
    return;
  }
});

// 点击外部关闭搜索结果
document.addEventListener('click', (e) => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.innerHTML = '';
  }
});

let searchAbort = null;

async function doSearch(q) {
  if (searchAbort) searchAbort.abort();
  searchAbort = new AbortController();
  const signal = searchAbort.signal;
  searchSelectedIdx = -1;
  const navPath = pathFromHash();
  const { rootIdx, rel } = parseNavPath(navPath);
  searchResults.innerHTML = '<div class="sr-loading">搜索中...</div>';
  try {
    const r = await fetch(`/www/_search?q=${encodeURIComponent(q)}&dir=${encodeURIComponent(rel)}&root=${rootIdx}`, { signal });
    if (!r.ok) throw new Error(r.status);
    const items = await r.json();
    if (items.length === 0) {
      searchResults.innerHTML = '<div class="sr-empty">未找到匹配文件</div>';
      return;
    }
    searchResults.innerHTML = '';
    for (const item of items) {
      const row = document.createElement('div');
      row.className = 'sr-item';

      const icon = document.createElement('div');
      icon.className = 'sr-icon';
      icon.innerHTML = item.type === 'directory' ? SVG.folder : fileIcon(item.name);

      const info = document.createElement('div');
      info.className = 'sr-info';

      const nameEl = document.createElement('div');
      nameEl.className = 'sr-name';
      // 高亮匹配关键词
      const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      nameEl.innerHTML = item.name.replace(regex, '<span style="color:#6d28d9;font-weight:600;">$1</span>');

      const pathEl = document.createElement('div');
      pathEl.className = 'sr-path';
      pathEl.textContent = item.path;

      info.append(nameEl, pathEl);
      row.append(icon, info);

      row.addEventListener('click', () => {
        searchResults.innerHTML = '';
        searchInput.value = '';
        const searchRoot = currentRootIdx;
        if (item.type === 'directory') {
          pendingHighlight = item.name;
          const parent = item.path.substring(0, item.path.lastIndexOf('/'));
          const parentDir = parent.substring(0, parent.lastIndexOf('/') + 1);
          location.hash = '#/' + makeNavPath(searchRoot, parentDir);
        } else {
          pendingHighlight = item.name;
          const dir = item.path.substring(0, item.path.lastIndexOf('/') + 1);
          location.hash = '#/' + makeNavPath(searchRoot, dir);
        }
      });

      searchResults.appendChild(row);
    }
  } catch (e) {
    if (e.name === 'AbortError') return;
    searchResults.innerHTML = `<div class="sr-empty">搜索失败 (${e.message})</div>`;
  }
}

// ---- 多根目录辅助 ----
let currentRootIdx = 0;

function parseNavPath(navPath) {
  if (!navPath) return { rootIdx: 0, rel: '' };
  const m = navPath.match(/^(\d+)\/(.*)$/);
  if (m) return { rootIdx: parseInt(m[1]), rel: m[2] || '' };
  // 旧格式(无 root 前缀),默认根 0
  return { rootIdx: 0, rel: navPath };
}
function makeNavPath(rootIdx, rel) {
  return rootIdx + '/' + (rel || '');
}

// ---- 导航 ----
function pathFromHash() {
  return decodeURIComponent(location.hash.replace(/^#\/?/, ''));
}
function navigate(rel) {
  location.hash = '#/' + rel;
}

async function expandTreeTo(navPath) {
  const { rootIdx, rel } = parseNavPath(navPath);
  const parts = rel.split('/').filter(Boolean);

  // 先展开根节点
  const rootNav = makeNavPath(rootIdx, '');
  await expandOneLevel(rootNav, 1);

  // 逐层展开子目录
  let accumulatedRel = '';
  for (const part of parts) {
    accumulatedRel += part + '/';
    await expandOneLevel(makeNavPath(rootIdx, accumulatedRel), accumulatedRel.split('/').filter(Boolean).length);
  }
}

async function expandOneLevel(levelNav, depth) {
  let row = document.querySelector(`.tree-item[data-path="${CSS.escape(levelNav)}"]`);
  if (!row) {
    // 父级节点还没加载，先 build 上一层
    const parentNav = levelNav.slice(0, levelNav.slice(0, -1).lastIndexOf('/') + 1);
    if (parentNav) {
      const parentRow = document.querySelector(`.tree-item[data-path="${CSS.escape(parentNav)}"]`);
      if (parentRow) {
        const parentChildren = parentRow.nextElementSibling;
        if (parentChildren && parentChildren.children.length === 0) {
          await buildTreeLevel(parentChildren, parentNav, depth - 1);
        }
      }
    }
    row = document.querySelector(`.tree-item[data-path="${CSS.escape(levelNav)}"]`);
  }
  if (row) {
    const children = row.nextElementSibling;
    if (children && children.classList.contains('tree-children')) {
      if (!children.classList.contains('open')) {
        children.classList.add('open');
        const toggle = row.querySelector('.tree-toggle');
        if (toggle) toggle.classList.add('open');
      }
      if (children.children.length === 0) {
        await buildTreeLevel(children, levelNav, depth);
        const toggle = row.querySelector('.tree-toggle');
        if (children.children.length === 0 && toggle) toggle.classList.add('empty');
      }
    }
  }
}

function collapseAllTree() {
  document.querySelectorAll('.tree-children.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.tree-toggle.open').forEach(el => el.classList.remove('open'));
}

async function rebuildTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  delete tree.dataset.loaded;
  const cfg = await window.__haystack.getCfg();
  for (let i = 0; i < cfg.roots.length; i++) {
    const root = cfg.roots[i];
    const navPath = makeNavPath(i, '');

    const node = document.createElement('div');
    const row = document.createElement('div');
    row.className = 'tree-item tree-root-item';
    row.dataset.path = navPath;
    row.style.paddingLeft = '20px';

    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle';
    toggle.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10"><path d="M3 1.5l4 3.5-4 3.5" stroke="#999" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    const icon = document.createElement('span');
    icon.className = 'tree-icon';
    icon.innerHTML = SVG.folder;

    const label = document.createElement('span');
    label.className = 'tree-label';
    label.textContent = root.name || root.path;
    label.style.fontWeight = '500';

    row.append(toggle, icon, label);

    const children = document.createElement('div');
    children.className = 'tree-children';

    row.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!children.dataset.loaded) {
        await buildTreeLevel(children, navPath, 1);
        if (children.children.length === 0) toggle.classList.add('empty');
      }
      const willOpen = !children.classList.contains('open');
      children.classList.toggle('open', willOpen);
      toggle.classList.toggle('open', willOpen);
      _suppressExpandTree = true;
      navigate(navPath);
    });

    node.append(row, children);
    tree.appendChild(node);
  }
}

// ---- 文件列表键盘导航 ----
let fileSelectedIdx = -1;

function getFileItems() {
  // 列表模式或缩略图模式
  const listItems = document.querySelectorAll('#content .file-list .file-item');
  if (listItems.length > 0) return listItems;
  return document.querySelectorAll('#content .thumb-card');
}

function updateFileSelection(items, idx) {
  items.forEach((el, i) => {
    if (el.classList.contains('thumb-card')) {
      el.style.boxShadow = i === idx ? '0 0 0 2px #6d28d9' : '';
      el.style.transform = i === idx ? 'translateY(-1px)' : '';
    } else {
      el.classList.toggle('highlight', i === idx);
    }
  });
  if (items[idx]) items[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

document.addEventListener('keydown', (e) => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (document.getElementById('preview-modal')) return;

  // Backspace 返回上级（优先处理，不依赖 items）
  if (e.key === 'Backspace') {
    e.preventDefault();
    const navPath = pathFromHash();
    if (navPath) {
      const { rootIdx, rel } = parseNavPath(navPath);
      if (rel) {
        const parts = rel.split('/').filter(Boolean);
        const parent = parts.slice(0, -1).join('/');
        location.hash = '#/' + (parent ? makeNavPath(rootIdx, parent + '/') : makeNavPath(rootIdx, ''));
      }
    }
    return;
  }

  const items = getFileItems();
  if (items.length === 0) return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    fileSelectedIdx = Math.min(fileSelectedIdx + 1, items.length - 1);
    updateFileSelection(items, fileSelectedIdx);
    return;
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    fileSelectedIdx = Math.max(fileSelectedIdx - 1, 0);
    updateFileSelection(items, fileSelectedIdx);
    return;
  }
  if (e.key === 'Enter' && fileSelectedIdx >= 0 && items[fileSelectedIdx]) {
    e.preventDefault();
    const row = items[fileSelectedIdx];
    // 缩略图卡片
    if (row.classList.contains('thumb-card')) {
      const cardName = row.dataset.name;
      const cardType = row.dataset.type;
      if (cardType === 'directory') {
        row.click();
      } else if (cardName) {
        const rel = pathFromHash();
        previewFile(BASE + rel + cardName, cardName);
      }
      return;
    }
    // 列表：".." 返回行
    const nameEl = row.querySelector('.file-name');
    if (nameEl && nameEl.textContent === '..') {
      row.click ? row.click() : location.hash = row.getAttribute('href');
      return;
    }
    // 目录
    if (row.style.cursor === 'pointer') {
      row.click();
      return;
    }
    // 文件：触发预览
    const previewBtn = row.querySelector('.act-btn');
    if (previewBtn) previewBtn.click();
    return;
  }
});

// ============================================================
// 复制网络地址:挂在 window 上,UI 可调用
// ============================================================
// 仅生成 URL,不复制 — 给"复制地址"按钮当 URL 源
window.__haystackBuildUrl = async function (absPath) {
  if (!absPath || !window.__haystack) return null;
  const cfg = await window.__haystack.getCfg();
  const root = (cfg.roots || []).find(r => absPath.startsWith(r.path));
  if (!root) return null;
  let rel = absPath.slice(root.path.length).replace(/^[\/\\]+/, '').replace(/\\/g, '/');
  // 转义只针对会破坏 URL 的字符,保留中文/Unicode 字面量
  const escape = s => s.replace(/[\s#?%]/g, c => '%' + c.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0'));
  // 优先用配置的 urlBase;没配则用本机 IP + 服务端口 + 根目录 basename 作为前缀
  let base;
  if (root.urlBase) {
    base = root.urlBase.replace(/\/+$/, '');
    if (!/^https?:\/\//i.test(base)) base = 'http://' + base;
  } else {
    const status = await window.__haystack.invoke('get_http_status').catch(() => null);
    const ip = await window.__haystack.invoke('get_local_ip').catch(() => '127.0.0.1');
    const port = status && status.port;
    const portSuffix = port && port !== 80 ? ':' + port : '';
    const basename = root.path.split(/[\/\\]/).filter(Boolean).pop() || '';
    base = `http://${ip}${portSuffix}` + (basename ? '/' + encodeURIComponent(basename) : '');
  }
  return base + '/' + rel.split('/').map(escape).join('/');
};

// 复制 URL 到剪贴板 — 给其他场景调用
window.__haystackCopyUrl = async function (absPath) {
  const url = await window.__haystackBuildUrl(absPath);
  if (!url) { alert('当前文件所属根目录未配置 URL 前缀'); return null; }
  try { await navigator.clipboard.writeText(url); } catch {}
  return url;
};

// ---- 跳转到路径 ----
(function () {
  const overlay = document.getElementById('gotoPathOverlay');
  const input = document.getElementById('gotoPathInput');
  const err = document.getElementById('gotoPathError');
  const btn = document.getElementById('btnGotoPath');
  if (!overlay || !input || !btn) return;

  function open() {
    err.textContent = '';
    input.value = '';
    overlay.style.display = 'flex';
    setTimeout(() => input.focus(), 0);
  }
  function close() { overlay.style.display = 'none'; }

  async function resolve(raw) {
    let p = (raw || '').trim();
    if (!p) return null;
    // 去掉粘贴时附带的引号
    p = p.replace(/^['"]|['"]$/g, '');
    // ~ 展开
    if (p === '~' || p.startsWith('~/') || p.startsWith('~\\')) {
      const cfg = await window.__haystack.getCfg();
      const home = cfg.roots[0]?.path || '';
      p = p.replace(/^~/, home);
    }
    // Windows 反斜杠 → 正斜杠
    p = p.replace(/\\/g, '/');
    // 必须是绝对路径
    const isAbs = p.startsWith('/') || /^[A-Za-z]:\//.test(p);
    if (!isAbs) return { error: '请输入绝对路径(以 / 开头,或 ~/...,或 C:/ ...)' };
    // 找到所属根
    const cfg = await window.__haystack.getCfg();
    const root = (cfg.roots || []).find(r => {
      const rp = (r.path || '').replace(/\\/g, '/');
      return p === rp || p.startsWith(rp.endsWith('/') ? rp : rp + '/');
    });
    if (!root) return { error: '该路径不在任何已配置的根目录下' };
    const rootIdx = cfg.roots.indexOf(root);
    const rp = (root.path || '').replace(/\\/g, '/');
    let rel = p.slice(rp.length).replace(/^\/+/, '');
    return { rel, abs: p, rootIdx };
  }

  async function submit() {
    const r = await resolve(input.value);
    if (!r) return;
    if (r.error) { err.textContent = r.error; return; }
    let rel = r.rel;
    const rootIdx = r.rootIdx;
    // 是否文件:输入未以 / 结尾时,尝试 list_dir;失败则视为文件,跳到父级并预览
    const trailingSlash = rel.endsWith('/');
    if (!trailingSlash && rel !== '') {
      try {
        await window.__haystack.invoke('list_dir', { path: r.abs });
        // 是目录
        rel = rel + '/';
      } catch {
        // 视为文件:跳到父级目录,然后预览
        const lastSlash = rel.lastIndexOf('/');
        const parent = lastSlash >= 0 ? rel.slice(0, lastSlash + 1) : '';
        const filename = lastSlash >= 0 ? rel.slice(lastSlash + 1) : rel;
        location.hash = '#/' + makeNavPath(rootIdx, parent);
        close();
        // 等待目录加载,再触发预览
        setTimeout(() => {
          try { previewFile(BASE + makeNavPath(rootIdx, parent) + filename, filename); } catch (e) { console.error(e); }
        }, 200);
        return;
      }
    } else if (rel === '') {
      // 跳转到根
    } else {
      // 已带 /,直接当目录
    }
    location.hash = '#/' + makeNavPath(rootIdx, rel);
    close();
  }

  btn.addEventListener('click', open);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
    else if (e.key === 'Escape') { e.preventDefault(); close(); }
  });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  // Cmd+L / Ctrl+L 全局快捷键
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'l' && !e.shiftKey && !e.altKey) {
      e.preventDefault();
      open();
    }
  });
})();
</script>
</body>
</html>
