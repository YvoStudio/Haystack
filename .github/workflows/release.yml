name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            args: '--target aarch64-apple-darwin'
            label: 'macos-arm64'
          - platform: 'macos-14'
            args: '--target x86_64-apple-darwin'
            label: 'macos-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            label: 'linux'
          - platform: 'windows-latest'
            args: ''
            label: 'windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Generate changelog from commits
        id: changelog
        shell: bash
        run: |
          git fetch --tags --force --quiet
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          ZH_FILE=$(mktemp)
          EN_FILE=$(mktemp)
          HAS_EN=0

          # 每个 commit 一段,分隔符 \x1F (single record sep);subject 在前,body 在后用 \x1E 分
          IFS=$'\n'
          for record in $(git log "$RANGE" --no-merges --pretty=format:'%H%x1E%s%x1E%b%x1F' | tr '\x1F' '\n'); do
            [ -z "$record" ] && continue
            subj=$(printf '%s' "$record" | awk -F$'\x1E' '{print $2}')
            body=$(printf '%s' "$record" | awk -F$'\x1E' '{print $3}')
            case "$subj" in
              Merge*|"chore: bump"*|"chore: release"*) continue ;;
            esac
            printf -- '- %s\n' "$subj" >> "$ZH_FILE"
            en=$(printf '%s' "$body" | grep -m1 '^EN: ' | sed 's/^EN: //')
            if [ -n "$en" ]; then
              HAS_EN=1
              printf -- '- %s\n' "$en" >> "$EN_FILE"
            else
              # 没标 EN: 的条目英文段直接复用中文 subject,避免不对齐
              printf -- '- %s\n' "$subj" >> "$EN_FILE"
            fi
          done

          [ -s "$ZH_FILE" ] || echo "- 维护性更新" > "$ZH_FILE"

          {
            echo "body<<__CHANGELOG_EOF__"
            echo "## 本次更新"
            echo ""
            cat "$ZH_FILE"
            if [ "$HAS_EN" = "1" ]; then
              echo ""
              echo "## What's Changed"
              echo ""
              cat "$EN_FILE"
            fi
            echo ""
            echo "---"
            echo "首次安装请见 [README](https://github.com/YvoStudio/Haystack#readme)。自 v0.1.1 起内置自动更新。"
            echo "First-time install: see [README](https://github.com/YvoStudio/Haystack#readme). Built-in auto-update since v0.1.1."
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Haystack ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
